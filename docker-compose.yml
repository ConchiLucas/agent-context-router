services:
  backend:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    restart: unless-stopped
    working_dir: /app/backend
    command: uv run uvicorn context_router.main:create_app --factory --host 0.0.0.0 --port 8000
    environment:
      CONTEXT_ROUTER_WORKSPACE_HOST_ROOT: ${CONTEXT_ROUTER_WORKSPACE_HOST_ROOT:-/Users/conchi/workforce}
      CONTEXT_ROUTER_WORKSPACE_CONTAINER_ROOT: /workspace
      CONTEXT_ROUTER_DEFAULT_PROJECT_NAME: ${CONTEXT_ROUTER_DEFAULT_PROJECT_NAME:-攀枝花多式联运}
      CONTEXT_ROUTER_DEFAULT_AGENTS_PATH: ${CONTEXT_ROUTER_DEFAULT_AGENTS_PATH:-/Users/conchi/workforce/company_workforce/panzhihua_workforce/panzhihua_dsly_workforce/AGENTS.md}
      CONTEXT_ROUTER_DATABASE_URL: ${CONTEXT_ROUTER_DATABASE_URL:-}
      CONTEXT_ROUTER_PUBLIC_MCP_URL: ${CONTEXT_ROUTER_PUBLIC_MCP_URL:-http://127.0.0.1:49173/mcp}
      CONTEXT_ROUTER_INTERNAL_MCP_URL: http://127.0.0.1:8000/mcp
      CONTEXT_ROUTER_MCP_TEST_TIMEOUT_SECONDS: ${CONTEXT_ROUTER_MCP_TEST_TIMEOUT_SECONDS:-15}
    ports:
      - "127.0.0.1:49173:8000"
    volumes:
      - .:/app
      - ${CONTEXT_ROUTER_WORKSPACE_HOST_ROOT:-/Users/conchi/workforce}:/workspace:ro

  frontend:
    image: node:22-bookworm
    restart: unless-stopped
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      CONTEXT_ROUTER_INTERNAL_API_URL: http://backend:8000
      NEXT_PUBLIC_CONTEXT_ROUTER_API_URL: http://127.0.0.1:49173
    ports:
      - "49174:3000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

volumes:
  frontend_node_modules:
