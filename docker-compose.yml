services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: context_router
      POSTGRES_USER: context_router
      POSTGRES_PASSWORD: context_router
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U context_router -d context_router"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    restart: "no"
    working_dir: /app/backend
    command: uv run uvicorn context_router.main:create_app --factory --host 0.0.0.0 --port 8000
    environment:
      CONTEXT_ROUTER_DATABASE_URL: postgresql+psycopg://context_router:context_router@postgres:5432/context_router
      CONTEXT_ROUTER_WORKSPACE_HOST_ROOT: /Users/conchi/workforce
      CONTEXT_ROUTER_WORKSPACE_CONTAINER_ROOT: /workspace
      CONTEXT_ROUTER_DOCUMENTS_HOST_ROOT: ${CONTEXT_ROUTER_DOCUMENTS_HOST_ROOT:-./document-sources}
      CONTEXT_ROUTER_DOCUMENTS_CONTAINER_ROOT: ${CONTEXT_ROUTER_DOCUMENTS_CONTAINER_ROOT:-/documents}
    ports:
      - "49173:8000"
    volumes:
      - .:/app
      - /Users/conchi/workforce:/workspace:ro
      - ${CONTEXT_ROUTER_DOCUMENTS_HOST_ROOT:-./document-sources}:${CONTEXT_ROUTER_DOCUMENTS_CONTAINER_ROOT:-/documents}:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-bookworm
    restart: "no"
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      CONTEXT_ROUTER_INTERNAL_API_URL: http://backend:8000
      NEXT_PUBLIC_CONTEXT_ROUTER_API_URL: http://127.0.0.1:49173
    ports:
      - "49174:3000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
