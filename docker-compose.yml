services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: context_router
      POSTGRES_USER: context_router
      POSTGRES_PASSWORD: context_router
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U context_router -d context_router"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

